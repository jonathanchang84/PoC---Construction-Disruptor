name: Python Code Verification Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    # FIX: Corrected the parameter key to python-version
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # FIX: Explicitly checking and handling file paths relative to workspace root
    - name: Inject Mock Streamlit Secrets
      run: |
        mkdir -p .streamlit
        cp tests/mock_secrets.toml .streamlit/secrets.toml

    # Run the testing suite framework
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-mock
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run pytest validation matrix
      run: |
        python -m pytest tests/ --verbose        python -m pip install --upgrade pip
        pip install pytest pytest-mock
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

        # Step 5: Inject mock secrets using absolute workspace paths
     Tar name: Inject Mock Streamlit Secrets
      run: |
        mkdir -p $GITHUB_WORKSPACE/.streamlit
        cp $GITHUB_WORKSPACE/tests/mock_secrets.toml $GITHUB_WORKSPACE/.streamlit/secrets.toml

    # Step 6: Execute the test suite
    - name: Run pytest validation matrix
      run: |
        python -m pytest tests/ --verbose
