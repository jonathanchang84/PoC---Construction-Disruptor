# This workflow will install Python dependencies and run tests with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    # 1. Check out the repository using updated Node 24 compatible actions
    - name: Checkout Code
      uses: actions/checkout@v4.2.2

    # 2. Set up Python environment using updated Node 24 compatible actions
    - name: Set up Python 3.13
      uses: actions/setup-python@v5.3.0
      with:
        python-version: "3.13"

    # 3. Leverage caching to speed up your pipeline execution runs
    - name: Cache Pip Packages
      uses: actions/cache@v4.2.0
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 4. Install project dependencies and force-inject testing requirements
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest pytest-mock supabase streamlit
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 5. Execute the entire 11-point Pytest Matrix
    - name: Test with pytest
      run: |
        python -m pytest . --verbose