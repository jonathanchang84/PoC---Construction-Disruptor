name: Python Code Verification Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Inject Mock Streamlit Secrets
      run: |
        mkdir -p .streamlit
        cat << 'EOF' > .streamlit/secrets.toml
        SUPABASE_URL = "https://mockinstance.supabase.co"
        SUPABASE_KEY = "mock-api-key-string"
        GEMINI_API_KEY = "mock-gemini-key-string"
        EOF
        echo "✅ Dynamic mock secrets successfully injected into .streamlit/secrets.toml"

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-mock
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run pytest validation matrix
      run: |
        python -m pytest tests/ --verbose